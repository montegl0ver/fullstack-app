<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DevOps Lab - Akylai</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f3; display: flex; justify-content: center; padding-top: 50px; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 400px; }
        h1 { color: #333; font-size: 20px; }
        input { width: 70%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 8px 12px; background-color: #5d5fef; color: white; border: none; border-radius: 4px; cursor: pointer; }
        ul { list-style: none; padding: 0; margin-top: 20px; }
        li { background: #f9f9f9; margin-bottom: 8px; padding: 10px; border-radius: 4px; border-left: 4px solid #5d5fef; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Студент: Акыллай Абдыканова</h1>
        <p>ID: 2026-DevOps</p>
        <hr>
        <input type="text" id="taskInput" placeholder="Введите задачу...">
        <button onclick="addTask()">+</button>
        <ul id="taskList"></ul>
    </div>

    <script>
        // ВАЖНО: Сюда вставим URL после деплоя бэкенда на Railway
        const API_URL = "https://ТВОЙ-БЭКЕНД.up.railway.app/api/tasks";

        async function loadTasks() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                const list = document.getElementById('taskList');
                list.innerHTML = data.map(t => `<li>${t.title}</li>`).join('');
            } catch (err) { console.error("Ошибка API:", err); }
        }

        async function addTask() {
            const input = document.getElementById('taskInput');
            if (!input.value) return;
            await fetch(API_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ title: input.value })
            });
            input.value = '';
            loadTasks();
        }
        loadTasks();
    </script>
</body>
</html>
